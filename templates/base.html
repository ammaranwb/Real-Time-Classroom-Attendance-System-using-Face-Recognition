<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1B3A2D !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #2D9B6F !important; }
    .nav-link.active { color: #2D9B6F !important; font-weight: 600; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .btn-primary { background: #2D9B6F; border-color: #2D9B6F; }
    .btn-primary:hover { background: #1B3A2D; border-color: #1B3A2D; }
    .badge-online { width:10px;height:10px;border-radius:50%;background:#2D9B6F;display:inline-block;}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-camera-video-fill me-2"></i>AttendAI</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-house me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if '/enroll' in request.path %}active{% endif %}" href="/enroll"><i class="bi bi-person-plus me-1"></i>Enroll</a></li>
        <li class="nav-item"><a class="nav-link {% if '/attendance' in request.path %}active{% endif %}" href="/attendance"><i class="bi bi-camera me-1"></i>Take Attendance</a></li>
        <li class="nav-item"><a class="nav-link {% if '/records' in request.path %}active{% endif %}" href="/records"><i class="bi bi-table me-1"></i>Records</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
